<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tab Harbor</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <div id="app">
    <header id="header">
      <div id="space-title-row">
        <span id="space-dot"></span>
        <h1 id="space-name">Tab Harbor</h1>
        <button id="import-arc" class="icon-btn" title="Arc からインポート">📥</button>
        <button id="edit-space" class="icon-btn" title="Space を編集">✎</button>
      </div>
      <nav id="space-chips" aria-label="Spaces"></nav>
    </header>

    <section id="pins-section">
      <div class="section-head">
        <span class="section-label">Pin</span>
        <span>
          <button id="new-folder" class="text-btn" title="フォルダを作成">＋ フォルダ</button>
          <button id="pin-current" class="text-btn" title="現在のタブを Pin に追加">＋ 現在のタブ</button>
        </span>
      </div>
      <div id="pin-list"></div>
    </section>

    <div id="divider"></div>

    <section id="tabs-section">
      <div class="section-head">
        <span class="section-label">タブ</span>
        <button id="new-tab" class="text-btn" title="この Space に新しいタブを開く">＋ 新しいタブ</button>
      </div>
      <div id="tab-list"></div>
    </section>

    <div id="tooltip" hidden></div>

    <dialog id="space-dialog">
      <form method="dialog" id="space-form">
        <h2 id="dialog-title">新しい Space</h2>
        <label for="space-name-input">名前</label>
        <input id="space-name-input" type="text" maxlength="40" required autocomplete="off" />
        <label>テーマ色</label>
        <div id="color-swatches"></div>
        <div class="dialog-actions">
          <button type="button" id="delete-space" class="danger" hidden>削除</button>
          <span class="spacer"></span>
          <button type="button" id="dialog-cancel">キャンセル</button>
          <button type="submit" id="dialog-save" class="primary">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="folder-dialog">
      <form method="dialog" id="folder-form">
        <h2 id="folder-dialog-title">新しいフォルダ</h2>
        <label for="folder-name-input">名前</label>
        <input id="folder-name-input" type="text" maxlength="80" required autocomplete="off" />
        <div class="dialog-actions">
          <span class="spacer"></span>
          <button type="button" id="folder-cancel">キャンセル</button>
          <button type="submit" class="primary">保存</button>
        </div>
      </form>
    </dialog>

    <input type="file" id="arc-file" accept=".json,application/json" hidden />
    <dialog id="import-dialog">
      <h2>Arc からインポート</h2>
      <div id="import-body"></div>
      <div class="dialog-actions">
        <span class="spacer"></span>
        <button type="button" id="import-cancel">キャンセル</button>
        <button type="button" id="import-confirm" class="primary">インポート</button>
      </div>
    </dialog>
  </div>
  <script src="arc-import.js"></script>
  <script src="panel.js"></script>
</body>
</html>
